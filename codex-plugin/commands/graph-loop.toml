description = "Run the entire-loop self-planning agent-org graph loop over a goal via `entire loop`"
prompt = "Run the graph loop over this goal: {{args}}. Do NOT re-implement any orchestration — shell the entire-loop Go core with the shell tool: run `entire loop \"{{args}}\"` (shorthand for `entire loop run \"{{args}}\"`). Prerequisite: the `entire` CLI and the `graph` plugin must be on PATH (the loop runs as `entire loop`); the `brain` plugin is optional. If the goal is empty, ask for one instead of running. Pass through any flags present in the goal — valid flags: --planner llm|fixed, --plan-mode dynamic|immutable, --rounds N, --max-rounds N, --jobs K, --measure-cmd \"<cmd>\" (read-only), --allow-mutating-build, --repo <path>, --model, --effort. By default the loop converges (loop-until-dry) and every seat runs in plan mode (proposes only, never edits the repo). Only add --allow-mutating-build when the user explicitly asks the loop to WRITE code: it spawns a bypassPermissions worker in an isolated throwaway `git clone --local --no-hardlinks` (own object store/refs, scrubbed env, discarded on every path) with NO OS sandbox — never use it on untrusted goals or repositories. After it finishes, report the outcome and point at `entire loop status` (run state at $ENTIRE_PLUGIN_DATA_DIR/runs/<id>/state.json). A run refused under no-egress mode exits non-zero — surface that rather than retrying."
